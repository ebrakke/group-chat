name: Deploy to Fly.io

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'Dockerfile.once'
      - 'deploy/once/**'
      - '.forgejo/workflows/docker-publish.yml'

jobs:
  deploy:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          # Forgejo runners often use a minimal container image; ensure deps exist.
          apk add --no-cache curl bash tar gzip ca-certificates || true
          curl -L https://fly.io/install.sh | sh
          $HOME/.fly/bin/flyctl version

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl deploy --app relay-chat --remote-only

      - name: Verify
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl status --app relay-chat
