name: CI/CD Pipeline - Fly.io Deploy

on:
  push:
    branches:
      - master
      - main

jobs:
  # Build and Test Job
  build-and-test:
    runs-on: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build and test API
        run: |
          cd api
          npm ci
          npm run build

      - name: Type check API
        run: |
          cd api
          npx tsc --noEmit

      - name: Build and test Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Type check Frontend
        run: |
          cd frontend
          npx tsc --noEmit

  # E2E Test Job
  e2e-tests:
    runs-on: docker
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Start development environment
        run: |
          # Start services using docker-compose.dev.yml
          docker compose -f docker-compose.dev.yml up -d
          
          # Wait for services to be healthy
          echo "Waiting for services to start..."
          sleep 15
          
          # Check if services are running
          docker ps | grep relay-chat || true

      - name: Run Playwright e2e tests
        run: |
          cd tests/e2e
          npm run test
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/e2e/test-results/
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml down -v || true

  # Deploy to Fly.io
  deploy-fly:
    runs-on: docker
    needs: e2e-tests
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH
          # Also add to current PATH for this step
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl version

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl deploy --app relay-chat --remote-only

      - name: Verify deployment
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          echo "Checking deployment status..."
          flyctl status --app relay-chat
          
          echo ""
          echo "✅ Deployment completed successfully!"
          echo "🌐 Site: https://chat.brakke.cc"
          echo "📊 Fly.io Dashboard: https://fly.io/apps/relay-chat"
