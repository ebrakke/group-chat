name: Publish Docker Image

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  publish:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect OS and install buildah
        run: |
          if command -v apt-get &>/dev/null; then
            apt-get update && apt-get install -y buildah
          elif command -v apk &>/dev/null; then
            apk add --no-cache buildah
          elif command -v dnf &>/dev/null; then
            dnf install -y buildah
          elif command -v yum &>/dev/null; then
            yum install -y buildah
          else
            echo "Unknown package manager" && exit 1
          fi

      - name: Build image
        run: |
          buildah build -f Dockerfile.once -t ghcr.io/ebrakke/group-chat:latest -t ghcr.io/ebrakke/group-chat:${{ github.sha }} .

      - name: Push to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          buildah login -u ebrakke -p "$GHCR_TOKEN" ghcr.io
          buildah push ghcr.io/ebrakke/group-chat:latest
          buildah push ghcr.io/ebrakke/group-chat:${{ github.sha }}
