name: Publish Docker Image

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  publish:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install buildah
        run: apk add --no-cache buildah

      - name: Build image
        run: |
          buildah build -f Dockerfile.once -t ghcr.io/ebrakke/group-chat:latest -t ghcr.io/ebrakke/group-chat:${{ github.sha }} .

      - name: Push to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          buildah login -u ebrakke -p "$GHCR_TOKEN" ghcr.io
          buildah push ghcr.io/ebrakke/group-chat:latest
          buildah push ghcr.io/ebrakke/group-chat:${{ github.sha }}
