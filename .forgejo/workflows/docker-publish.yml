name: Publish Docker Image

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  publish:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          apt-get update && apt-get install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable" > /etc/apt/sources.list.d/docker.list
          apt-get update && apt-get install -y docker-ce-cli

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ebrakke --password-stdin

      - name: Build and push
        run: |
          IMAGE=ghcr.io/ebrakke/group-chat
          REF="${{ github.ref }}"

          if [[ "$REF" == refs/tags/v* ]]; then
            # Tagged release: extract version, push :latest and :v1.2.3
            VERSION="${REF#refs/tags/}"
            docker build -f Dockerfile.once \
              --build-arg VERSION="$VERSION" \
              -t "$IMAGE:latest" \
              -t "$IMAGE:$VERSION" \
              .
            docker push "$IMAGE:latest"
            docker push "$IMAGE:$VERSION"
          else
            # Branch push: push :dev
            docker build -f Dockerfile.once \
              -t "$IMAGE:dev" \
              .
            docker push "$IMAGE:dev"
          fi
