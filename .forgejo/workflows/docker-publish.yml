name: Publish Docker Image

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  publish:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check environment
        run: |
          echo "=== OS ==="
          cat /etc/os-release 2>/dev/null || echo "no os-release"
          echo "=== Docker socket ==="
          ls -la /var/run/docker.sock 2>/dev/null || echo "no docker socket"
          echo "=== Commands available ==="
          which docker 2>/dev/null || echo "no docker"
          which buildah 2>/dev/null || echo "no buildah"
          which podman 2>/dev/null || echo "no podman"
          echo "=== Kernel ==="
          uname -a
          echo "=== User ==="
          id
