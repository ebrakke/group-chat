name: Preview Deploy (Fly.io)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to use for naming/commenting (optional)"
        required: false
        type: string

jobs:
  preview:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          apk add --no-cache curl bash tar gzip ca-certificates || true
          apt-get update && apt-get install -y curl bash ca-certificates python3 || true
          curl -L https://fly.io/install.sh | sh
          $HOME/.fly/bin/flyctl version

      - name: Compute preview app name
        id: app
        run: |
          # App names must be globally unique and lowercase. Keep it short.
          PR_NUMBER="${{ github.event.pull_request.number }}"
          # Allow manual re-dispatch via workflow_dispatch
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          fi
          APP="relay-chat-pr-${PR_NUMBER}"
          echo "app=${APP}" >> $GITHUB_OUTPUT
          echo "APP=${APP}" >> $GITHUB_ENV
          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_ENV

      - name: Recreate preview app (ephemeral)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # For deterministic E2E: destroy and recreate the app every run.
          # This clears volumes and ensures bootstrap/login state is fresh.
          set +e
          $HOME/.fly/bin/flyctl apps destroy "$APP" --yes >/dev/null 2>&1
          set -e
          $HOME/.fly/bin/flyctl apps create "$APP" --org personal

      - name: Reset preview data (best-effort)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # We want PR preview envs to be ephemeral so bootstrap-based tests are deterministic.
          # Fly volumes persist across deploys, so wipe them before deploying.
          set +e
          IDS=$($HOME/.fly/bin/flyctl volumes list --app "$APP" 2>/dev/null | awk 'NR>1 {print $1}')
          for id in $IDS; do
            echo "Destroying volume $id"
            $HOME/.fly/bin/flyctl volumes destroy "$id" --app "$APP" --yes || true
          done
          set -e

      - name: Deploy preview
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl deploy --app "$APP" --remote-only

      - name: Show URL
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl info --app "$APP" || true

      - name: Wait for app to be healthy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          BASE_URL="https://${APP}.fly.dev"
          echo "Waiting for ${BASE_URL} to respond..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 "${BASE_URL}/api/auth/has-users" >/dev/null 2>&1; then
              echo "App is healthy!"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 5s..."
            sleep 5
          done
          echo "App did not become healthy in time"
          exit 1

      - name: Install bun
        run: |
          apk add --no-cache curl bash unzip libc6-compat ca-certificates || true
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Playwright deps
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          cd tests/e2e
          bun install --frozen-lockfile 2>/dev/null || bun install
          bunx playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          export BASE_URL="https://${APP}.fly.dev"
          echo "BASE_URL=${BASE_URL}" >> $GITHUB_ENV
          cd tests/e2e
          set +e
          bunx playwright test --reporter=list > playwright-output.log 2>&1
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Capture fly logs
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set +e
          $HOME/.fly/bin/flyctl logs --app "$APP" --no-tail > fly-output.log 2>&1
          true

      - name: Upload Playwright artifacts
        if: failure() && steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v3
        with:
          name: playwright-results-pr-${{ env.PR_NUMBER }}
          path: |
            tests/e2e/playwright-output.log
            fly-output.log
            tests/e2e/test-results/
            tests/e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment failure summary on PR
        if: failure() && steps.smoke.outcome == 'failure'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_BASE_URL: ${{ secrets.FORGEJO_BASE_URL }}
        run: |
          FORGE_URL="${FORGEJO_BASE_URL:-https://forge.brakke.cc}"
          EXIT_CODE="${{ steps.smoke.outputs.exit_code }}"

          PW_LOG="tests/e2e/playwright-output.log"
          if [ -f "$PW_LOG" ] && [ -s "$PW_LOG" ]; then
            PW_TAIL=$(tail -80 "$PW_LOG")
          else
            PW_TAIL="(no Playwright output captured)"
          fi

          FLY_LOG_FILE="fly-output.log"
          if [ -f "$FLY_LOG_FILE" ] && [ -s "$FLY_LOG_FILE" ]; then
            FLY_LOGS=$(tail -120 "$FLY_LOG_FILE")
          else
            FLY_LOGS="(no fly logs captured)"
          fi

          export APP BASE_URL EXIT_CODE PW_TAIL FLY_LOGS

          PAYLOAD=$(python3 - <<'PY'
          import json, os
          app=os.environ.get('APP','')
          base_url=os.environ.get('BASE_URL','')
          exit_code=os.environ.get('EXIT_CODE','')
          pw_tail=os.environ.get('PW_TAIL','')
          fly_logs=os.environ.get('FLY_LOGS','')
          body = f"""## E2E Smoke Test Failed

          | Field | Value |
          |-------|-------|
          | **App** | `{app}` |
          | **Base URL** | {base_url} |
          | **Exit code** | `{exit_code}` |

          <details><summary>Playwright output (last 80 lines)</summary>

          ```
          {pw_tail}
          ```

          </details>

          <details><summary>Fly logs (last 120 lines)</summary>

          ```
          {fly_logs}
          ```

          </details>
          """
          print(json.dumps({"body": body}))
          PY
          )

          if [ -z "${FORGEJO_TOKEN:-}" ]; then
            echo "FORGEJO_TOKEN not set; skipping PR comment"
            exit 0
          fi

          curl -sf -X POST \
            "${FORGE_URL}/api/v1/repos/erik/relay-chat/issues/${PR_NUMBER}/comments" \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
