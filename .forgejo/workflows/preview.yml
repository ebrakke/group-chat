name: Preview Deploy (Fly.io)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          apk add --no-cache curl bash tar gzip ca-certificates || true
          curl -L https://fly.io/install.sh | sh
          $HOME/.fly/bin/flyctl version

      - name: Compute preview app name
        id: app
        run: |
          # App names must be globally unique and lowercase. Keep it short.
          PR_NUMBER="${{ github.event.pull_request.number }}"
          APP="relay-chat-pr-${PR_NUMBER}"
          echo "app=${APP}" >> $GITHUB_OUTPUT
          echo "APP=${APP}" >> $GITHUB_ENV

      - name: Ensure preview app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          if $HOME/.fly/bin/flyctl status --app "$APP" >/dev/null 2>&1; then
            echo "Preview app exists: $APP"
          else
            echo "Creating preview app: $APP"
            $HOME/.fly/bin/flyctl apps create "$APP" --org personal
          fi

      - name: Deploy preview
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Preview env is ephemeral by default (no volume). That's fine for PR testing.
          $HOME/.fly/bin/flyctl deploy --app "$APP" --remote-only

      - name: Show URL
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl info --app "$APP" || true
