name: Preview Deploy (Fly.io)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          apk add --no-cache curl bash tar gzip ca-certificates jq || true
          curl -L https://fly.io/install.sh | sh
          $HOME/.fly/bin/flyctl version

      - name: Compute preview app name
        id: app
        run: |
          # App names must be globally unique and lowercase. Keep it short.
          PR_NUMBER="${{ github.event.pull_request.number }}"
          APP="relay-chat-pr-${PR_NUMBER}"
          echo "app=${APP}" >> $GITHUB_OUTPUT
          echo "APP=${APP}" >> $GITHUB_ENV
          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_ENV

      - name: Ensure preview app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          if $HOME/.fly/bin/flyctl status --app "$APP" >/dev/null 2>&1; then
            echo "Preview app exists: $APP"
          else
            echo "Creating preview app: $APP"
            $HOME/.fly/bin/flyctl apps create "$APP" --org personal
          fi

      - name: Deploy preview
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Preview env is ephemeral by default (no volume). That's fine for PR testing.
          $HOME/.fly/bin/flyctl deploy --app "$APP" --remote-only

      - name: Show URL
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl info --app "$APP" || true

      - name: Install bun + Playwright
        run: |
          apk add --no-cache curl bash nodejs chromium unzip libc6-compat || true
          # Install bun (needed because tests use bun.lock)
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          cd tests/e2e
          bun install --frozen-lockfile 2>/dev/null || bun install
          bunx playwright install --with-deps chromium 2>/dev/null || true

      - name: Run smoke tests
        id: smoke
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          BASE_URL="https://${APP}.fly.dev"
          echo "BASE_URL=${BASE_URL}" >> $GITHUB_ENV
          cd tests/e2e
          set +e
          bunx playwright test --reporter=list --base-url "$BASE_URL" 2>&1 | tee playwright-output.log
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload Playwright artifacts
        if: failure() && steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v3
        with:
          name: playwright-results-pr-${{ env.PR_NUMBER }}
          path: |
            tests/e2e/test-results/
            tests/e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment failure summary on PR
        if: failure() && steps.smoke.outcome == 'failure'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_BASE_URL: ${{ secrets.FORGEJO_BASE_URL }}
        run: |
          FORGE_URL="${FORGEJO_BASE_URL:-https://forge.brakke.cc}"
          EXIT_CODE="${{ steps.smoke.outputs.exit_code }}"

          # Playwright output
          PW_LOG="tests/e2e/playwright-output.log"
          if [ -f "$PW_LOG" ] && [ -s "$PW_LOG" ]; then
            PW_TAIL=$(tail -80 "$PW_LOG")
          else
            PW_TAIL="(no Playwright output captured)"
          fi

          # Fly logs (best-effort)
          FLY_LOGS=$($HOME/.fly/bin/flyctl logs --app "$APP" --no-tail 2>&1 | tail -120) || FLY_LOGS="(could not fetch fly logs)"

          # Build JSON payload with jq (handles escaping safely)
          PAYLOAD=$(jq -n \
            --arg app "$APP" \
            --arg base_url "$BASE_URL" \
            --arg exit_code "$EXIT_CODE" \
            --arg pw_tail "$PW_TAIL" \
            --arg fly_logs "$FLY_LOGS" \
            '{body: ("## E2E Smoke Test Failed\n\n| Field | Value |\n|-------|-------|\n| **App** | `" + $app + "` |\n| **Base URL** | " + $base_url + " |\n| **Exit code** | `" + $exit_code + "` |\n\n<details><summary>Playwright output (last 80 lines)</summary>\n\n```\n" + $pw_tail + "\n```\n\n</details>\n\n<details><summary>Fly logs (last 120 lines)</summary>\n\n```\n" + $fly_logs + "\n```\n\n</details>")}')

          # Post comment via Forgejo API
          curl -sf -X POST \
            "${FORGE_URL}/api/v1/repos/erik/relay-chat/issues/${PR_NUMBER}/comments" \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
