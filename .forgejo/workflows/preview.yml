name: Preview Deploy (Fly.io)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          apk add --no-cache curl bash tar gzip ca-certificates || true
          curl -L https://fly.io/install.sh | sh
          $HOME/.fly/bin/flyctl version

      - name: Compute preview app name
        id: app
        run: |
          # App names must be globally unique and lowercase. Keep it short.
          PR_NUMBER="${{ github.event.pull_request.number }}"
          APP="relay-chat-pr-${PR_NUMBER}"
          echo "app=${APP}" >> $GITHUB_OUTPUT
          echo "APP=${APP}" >> $GITHUB_ENV

      - name: Ensure preview app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          if $HOME/.fly/bin/flyctl status --app "$APP" >/dev/null 2>&1; then
            echo "Preview app exists: $APP"
          else
            echo "Creating preview app: $APP"
            $HOME/.fly/bin/flyctl apps create "$APP" --org personal
          fi

      - name: Deploy preview
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Preview env is ephemeral by default (no volume). That's fine for PR testing.
          $HOME/.fly/bin/flyctl deploy --app "$APP" --remote-only

      - name: Show URL
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl info --app "$APP" || true

      - name: Wait for app to be healthy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          BASE_URL="https://${APP}.fly.dev"
          echo "Waiting for ${BASE_URL} to respond..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 "${BASE_URL}/api/auth/has-users" >/dev/null 2>&1; then
              echo "App is healthy!"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 5s..."
            sleep 5
          done
          echo "App did not become healthy in time"
          exit 1

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install
          bunx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: tests/e2e
        env:
          BASE_URL: "https://${{ env.APP }}.fly.dev"
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run test:smoke
