name: Test Pipeline

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  # Build and Type Check
  build-and-test:
    runs-on: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and test Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Type check Frontend
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build relay backend
        run: |
          cd relay
          go build -o relay .

  # E2E Smoke Tests - Desktop and Mobile viewports in one run
  e2e-tests:
    runs-on: host
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Start development environment
        run: |
          docker compose -f docker-compose.dev.yml down -v || true
          docker compose -f docker-compose.dev.yml up --build -d
          echo "Waiting for services to start..."
          sleep 15
          docker ps | grep relay-chat || true

      - name: Run Playwright smoke tests
        run: |
          cd tests/e2e
          npm run test:ci
        env:
          CI: true

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml down -v || true
