name: E2E Tests

on:
  pull_request:
  push:
    branches: [main, refactor/path-based-routing]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install E2E deps
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Start dev stack
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3002/api/v1/health > /dev/null; then
              echo "Frontend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          docker compose -f docker-compose.dev.yml logs
          exit 1

      - name: Run smoke + critical-path + core chat specs
        working-directory: tests/e2e
        run: |
          npx playwright test \
            tests/01-smoke.spec.ts \
            tests/06-critical-path.spec.ts \
            tests/channels.spec.ts \
            tests/messaging.spec.ts \
            tests/threads.spec.ts \
            tests/reactions.spec.ts

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          if-no-files-found: ignore

      - name: Docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs

      - name: Stop dev stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
