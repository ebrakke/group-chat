services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3002:5173"
    environment:
      - VITE_API_URL=
      - RELAY_URL=ws://relay:3334
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
      - ./frontend/svelte.config.js:/app/svelte.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    depends_on:
      - relay

  api:
    build: ./api
    ports:
      - "4002:4000"
    environment:
      - DATABASE_PATH=/data/relay-chat.db
      - RELAY_URL=ws://relay:3334
      - BLOSSOM_URL=http://blossom:3000
      - SESSION_SECRET=dev-session-secret-not-for-production
      - KEY_ENCRYPTION_SECRET=dev-key-encryption-secret-not-for-production
      - INVITE_REQUIRED=false
      - MAX_UPLOAD_SIZE=52428800
      # Stable server keypair - this pubkey must be in ALLOWED_PUBKEYS below
      - SERVER_PRIVKEY=27b272d8c82f77eafa45289ce75ca33be7d90d01eb5462f333d977b1ea8a2503
    volumes:
      - dev-api-data:/data
      # Mount source for hot-reload during development
      - ./api/src:/app/src:ro
    depends_on:
      - relay

  relay:
    build: ./relay
    ports:
      - "3336:3334"
    environment:
      # Stable relay keypair
      - RELAY_PRIVKEY=25b01afc58f00f3dd3891faf32ad285143456df297f4f2540c692b3109d8d7f5
      - RELAY_DOMAIN=localhost
      # Allow the API server's pubkey to connect
      - ALLOWED_PUBKEYS=eb791dd5f7d08ff2831e20ef074d04daea835b68e59803c8b5fffaef816d16e6
    volumes:
      - dev-relay-data:/data

  blossom:
    image: ghcr.io/hzrd149/blossom-server:master
    ports:
      - "3337:3000"
    volumes:
      - dev-blossom-data:/app/data

volumes:
  dev-api-data:
  dev-relay-data:
  dev-blossom-data:
