services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_URL=https://chat.brakke.cc/api/v1
      - PUBLIC_WS_URL=wss://chat.brakke.cc/ws
      - DATABASE_PATH=/data/relay-chat.db
      - RELAY_URL=ws://relay:3334
      - BLOSSOM_URL=http://blossom:3335
      - SESSION_SECRET=change-me-in-production-use-random-64-chars
      - KEY_ENCRYPTION_SECRET=change-me-in-production-use-random-64-chars
      - INVITE_REQUIRED=true
      - MAX_UPLOAD_SIZE=52428800
      # Stable server keypair - this pubkey must be in ALLOWED_PUBKEYS below
      - SERVER_PRIVKEY=27b272d8c82f77eafa45289ce75ca33be7d90d01eb5462f333d977b1ea8a2503
    volumes:
      - frontend-data:/data
    depends_on:
      - relay

  relay:
    build: ./relay
    ports:
      - "3334:3334"
    environment:
      # Stable relay keypair
      - RELAY_PRIVKEY=25b01afc58f00f3dd3891faf32ad285143456df297f4f2540c692b3109d8d7f5
      - RELAY_DOMAIN=localhost
      # Allow the API server's pubkey to connect
      - ALLOWED_PUBKEYS=eb791dd5f7d08ff2831e20ef074d04daea835b68e59803c8b5fffaef816d16e6
    volumes:
      - relay-data:/data

  blossom:
    image: ghcr.io/hzrd149/blossom-server:master
    ports:
      - "3335:3000"
    volumes:
      - blossom-data:/app/data

volumes:
  frontend-data:
  relay-data:
  blossom-data:
