# fly.toml - relay-chat-blossom
app = "relay-chat-blossom"
primary_region = "iad"

[build]
  image = "ghcr.io/hzrd149/blossom-server:master"

[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

[mounts]
  source = "blossom_data"
  destination = "/app/data"
  initial_size = "5gb"
