# fly.toml - relay-chat-frontend
app = "relay-chat-frontend"
primary_region = "iad"

[build]
  dockerfile = "frontend/Dockerfile"

[env]
  PORT = "8080"
  API_URL = "http://relay-chat-api.flycast:4000"
  VITE_API_URL = ""
  VITE_WS_URL = "/ws"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
