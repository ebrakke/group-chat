# fly.toml - relay-chat-relay
app = "relay-chat-relay"
primary_region = "iad"

[build]
  dockerfile = "relay/Dockerfile"

[env]
  PORT = "3334"
  DATABASE_PATH = "/data/relay.db"
  RELAY_DOMAIN = "chat.brakke.cc"

# Secrets to set via `fly secrets set`:
# RELAY_PRIVKEY=<nostr-private-key-hex>
# ALLOWED_PUBKEYS=<comma-separated-pubkeys>

[http_service]
  internal_port = 3334
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    port = 3334

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

[mounts]
  source = "relay_data"
  destination = "/data"
  initial_size = "1gb"
